version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: coredent-pms:latest
    container_name: coredent-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - logs:/var/log/nginx
    networks:
      - coredent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.coredent.service=frontend"
      - "com.coredent.environment=production"

  # Nginx Reverse Proxy (optional, for load balancing)
  nginx-proxy:
    image: nginx:alpine
    container_name: coredent-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    networks:
      - coredent-network
    depends_on:
      - frontend

networks:
  coredent-network:
    driver: bridge

volumes:
  logs:
    driver: local
